version: "3.9"

# ──────────────────────────────────────────────
#  Medical B2B ERP — Docker Compose Stack
#  Uses MongoDB Atlas (no local MongoDB container)
#  Start everything: docker compose up -d
# ──────────────────────────────────────────────

networks:
  med-erp-net:
    driver: bridge

services:

  # ─── User Service ─────────────────────────────────────────────────────────
  user-service:
    build:
      context: ../user-service
      dockerfile: Dockerfile
    container_name: med-erp-user-service
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      MONGODB_URI: ${MONGODB_URI_USERS:-mongodb+srv://linux:redhat@cluster0.32n20bl.mongodb.net/users_db?retryWrites=true&w=majority&appName=Cluster0}
      JWT_SECRET: ${JWT_SECRET:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      JWT_EXPIRATION: 86400000
      JWT_REFRESH_EXPIRATION: 604800000
      CORS_ALLOWED_ORIGINS: "*"
    networks:
      - med-erp-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/api/v1/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ─── Product Service ──────────────────────────────────────────────────────
  product-service:
    build:
      context: ../product-service
      dockerfile: Dockerfile
    container_name: med-erp-product-service
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      MONGODB_URI: ${MONGODB_URI_PRODUCTS:-mongodb+srv://linux:redhat@cluster0.32n20bl.mongodb.net/products_db?retryWrites=true&w=majority&appName=Cluster0}
      JWT_SECRET: ${JWT_SECRET:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      CORS_ALLOWED_ORIGINS: "*"
      LOW_STOCK_THRESHOLD: 10
    networks:
      - med-erp-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/api/v1/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ─── Order Service ────────────────────────────────────────────────────────
  order-service:
    build:
      context: ../order-service
      dockerfile: Dockerfile
    container_name: med-erp-order-service
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      MONGODB_URI: ${MONGODB_URI_ORDERS:-mongodb+srv://linux:redhat@cluster0.32n20bl.mongodb.net/orders_db?retryWrites=true&w=majority&appName=Cluster0}
      JWT_SECRET: ${JWT_SECRET:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      CORS_ALLOWED_ORIGINS: "*"
      PRODUCT_SERVICE_URL: http://product-service:8082/api/v1
      USER_SERVICE_URL: http://user-service:8081/api/v1
    depends_on:
      product-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
    networks:
      - med-erp-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8083/api/v1/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ─── Frontend ─────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: med-erp-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - user-service
      - product-service
      - order-service
    networks:
      - med-erp-net
